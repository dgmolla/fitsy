name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  structural:
    name: Structural Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run structural tests
        run: bash scripts/structural-tests.sh

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          # Search apps/, packages/, scripts/ — not node_modules or spike/test output
          if grep -rn \
            --include="*.ts" --include="*.tsx" \
            --exclude-dir=node_modules \
            --exclude-dir=discovery-test \
            -E '(ANTHROPIC_API_KEY\s*=\s*"sk-ant|GOOGLE_PLACES_API_KEY\s*=\s*"AIza|FIRECRAWL_API_KEY\s*=\s*"fc-|sk_test_|sk_live_|pk_test_|pk_live_|"-----BEGIN (RSA|EC|OPENSSH) PRIVATE KEY)' \
            apps/ packages/ scripts/ 2>/dev/null; then
            echo "::error::Hardcoded secrets found"
            exit 1
          fi

      - name: Check no .env files committed
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD 2>/dev/null || git diff --name-only HEAD^ HEAD 2>/dev/null || true)
          if echo "$CHANGED" | grep -E '(^|/)\.env$' | grep -v '\.env\.example'; then
            echo "::error::.env file committed"
            exit 1
          fi

      - name: Check no build output committed
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD 2>/dev/null || true)
          if echo "$CHANGED" | grep -E '\.(js|js\.map)$' | grep -vE '(\.config\.(js|cjs|mjs)|^scripts/)'; then
            echo "::error::Compiled build output committed — add to .gitignore"
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check if project is scaffolded
        id: check
        run: |
          if [ -f package-lock.json ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "No package-lock.json — monorepo not scaffolded yet, skipping lint"
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.ready == 'true'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: steps.check.outputs.ready == 'true'
      - name: Lint
        if: steps.check.outputs.ready == 'true'
        run: npm run lint --workspaces --if-present

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check if TypeScript workspaces exist
        id: check
        run: |
          if [ -f apps/api/package.json ] || [ -f apps/mobile/package.json ] || [ -f packages/shared/package.json ]; then
            echo "has_ts=true" >> $GITHUB_OUTPUT
          else
            echo "has_ts=false" >> $GITHUB_OUTPUT
            echo "No TypeScript workspaces yet — skipping"
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.has_ts == 'true'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: steps.check.outputs.has_ts == 'true'
      - name: Type check — API
        if: steps.check.outputs.has_ts == 'true'
        run: |
          if [ -f apps/api/tsconfig.json ]; then
            cd apps/api && npx tsc --noEmit
          fi
      - name: Type check — Mobile
        if: steps.check.outputs.has_ts == 'true'
        run: |
          if [ -f apps/mobile/tsconfig.json ]; then
            cd apps/mobile && npx tsc --noEmit
          fi
      - name: Type check — Shared
        if: steps.check.outputs.has_ts == 'true'
        run: |
          if [ -f packages/shared/tsconfig.json ]; then
            cd packages/shared && npx tsc --noEmit
          fi

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: fitsy_test
          POSTGRES_PASSWORD: fitsy_test
          POSTGRES_DB: fitsy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Check if project is scaffolded
        id: check
        run: |
          if [ -f package-lock.json ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "No package-lock.json — monorepo not scaffolded yet, skipping tests"
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.ready == 'true'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: steps.check.outputs.ready == 'true'
      - name: Apply Prisma migrations
        if: steps.check.outputs.ready == 'true'
        run: npx prisma migrate deploy
        env:
          # Prisma schema uses POSTGRES_PRISMA_URL (pooled) + POSTGRES_URL_NON_POOLING (direct).
          # In CI both point to the same local container — no separate pooler needed.
          POSTGRES_PRISMA_URL: postgresql://fitsy_test:fitsy_test@localhost:5432/fitsy_test
          POSTGRES_URL_NON_POOLING: postgresql://fitsy_test:fitsy_test@localhost:5432/fitsy_test
      - name: Run tests with coverage gate
        if: steps.check.outputs.ready == 'true'
        run: npm run test:coverage --workspace=apps/api
        env:
          POSTGRES_PRISMA_URL: postgresql://fitsy_test:fitsy_test@localhost:5432/fitsy_test
          POSTGRES_URL_NON_POOLING: postgresql://fitsy_test:fitsy_test@localhost:5432/fitsy_test
          # External API keys intentionally absent — tests must mock all external services

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Check if project is scaffolded
        id: check
        run: |
          if [ -f package-lock.json ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "No package-lock.json — monorepo not scaffolded yet, skipping build"
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.ready == 'true'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: steps.check.outputs.ready == 'true'
      - name: Build API
        if: steps.check.outputs.ready == 'true'
        run: npm run build:api
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          GOOGLE_PLACES_API_KEY: placeholder
          ANTHROPIC_API_KEY: placeholder
          JWT_SECRET: placeholder-for-build-only
      - name: Verify no build output in working tree
        if: steps.check.outputs.ready == 'true'
        run: |
          if git status --porcelain | grep -E '\.(js|js\.map)$' | grep -v node_modules; then
            echo "::error::Build produced .js files in source tree — check .gitignore"
            exit 1
          fi
