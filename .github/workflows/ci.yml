name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for hardcoded secrets
        run: |
          if grep -rn --include="*.ts" --include="*.tsx" \
            -E '(sk_test_|sk_live_|pk_test_|pk_live_|PRIVATE_KEY=)' \
            src/ 2>/dev/null; then
            echo "::error::Hardcoded secrets found"
            exit 1
          fi
      - name: Check for .env files
        run: |
          if git diff --name-only HEAD | grep -E '\.env$' | grep -v 'env\.example'; then
            echo "::error::.env file committed"
            exit 1
          fi

  structural:
    name: Structural Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/structural-tests.sh

