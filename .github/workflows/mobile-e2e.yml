name: Mobile E2E (Maestro + Simulator)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag for uploading recordings"
        required: false
        default: "e2e-mobile-sprint7"

# Requires macos runner for xcrun simctl + Xcode
jobs:
  mobile-e2e:
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      EXPO_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}
      RELEASE_TAG: ${{ github.event.inputs.release_tag || 'e2e-mobile-sprint7' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Maestro CLI
        run: curl -Ls "https://get.maestro.mobile.dev" | bash
        # Maestro installs to ~/.maestro/bin; add to PATH for subsequent steps

      - name: Add Maestro to PATH
        run: echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Install Expo CLI
        run: npm install -g expo-cli @expo/cli eas-cli

      - name: Build iOS app (simulator)
        working-directory: apps/mobile
        run: |
          npx expo prebuild --platform ios --clean
          xcodebuild \
            -workspace ios/Fitsy.xcworkspace \
            -scheme Fitsy \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Boot iOS Simulator
        run: |
          DEVICE_UDID=$(xcrun simctl list devices available | grep "iPhone 15 Pro" | head -1 | grep -o '[A-F0-9-]\{36\}')
          if [[ -z "$DEVICE_UDID" ]]; then
            DEVICE_UDID=$(xcrun simctl list devices available | grep "iPhone" | head -1 | grep -o '[A-F0-9-]\{36\}')
          fi
          echo "SIMULATOR_UDID=$DEVICE_UDID" >> $GITHUB_ENV
          xcrun simctl boot "$DEVICE_UDID" || true

      - name: Install app on simulator
        run: |
          APP_PATH=$(find apps/mobile/build -name "*.app" -type d | head -1)
          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"

      - name: Run Maestro flows + capture recordings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/record-mobile-e2e.sh --release-tag "$RELEASE_TAG"

      - name: Upload recordings as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-e2e-recordings
          path: recordings/*.mp4
          retention-days: 30

      - name: Upload Maestro screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots
          path: ~/.maestro/tests/
          retention-days: 7
