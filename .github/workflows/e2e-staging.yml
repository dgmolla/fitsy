name: E2E Staging Tests

on:
  push:
    branches: [main]

concurrency:
  group: e2e-staging
  cancel-in-progress: true

jobs:
  e2e:
    name: Maestro E2E
    runs-on: macos-latest
    # Only run when e2e flows and mobile app exist
    if: hashFiles('e2e/flows/*.yaml') != '' && hashFiles('apps/mobile/package.json') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Build Expo preview
        run: cd apps/mobile && npx expo prebuild --platform ios --no-install
        env:
          API_URL: ${{ secrets.STAGING_API_URL }}

      - name: Run Maestro flows
        run: maestro test e2e/flows/
        env:
          MAESTRO_APP_ID: com.fitsy.app

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots
          path: ~/.maestro/tests/
          retention-days: 7
