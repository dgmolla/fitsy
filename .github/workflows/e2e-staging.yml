name: E2E Staging Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-staging
  cancel-in-progress: true

jobs:
  e2e:
    name: Maestro E2E
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if E2E flows and mobile app exist
        id: check
        run: |
          if ls e2e/flows/*.yaml 1>/dev/null 2>&1 && [ -f apps/mobile/package.json ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "No E2E flows or mobile app yet — skipping"
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.should_run == 'true'
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        if: steps.check.outputs.should_run == 'true'

      - name: Install Maestro
        if: steps.check.outputs.should_run == 'true'
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Expo prebuild (iOS)
        id: prebuild
        if: steps.check.outputs.should_run == 'true'
        working-directory: apps/mobile
        continue-on-error: true
        run: npx expo prebuild --platform ios --no-install
        env:
          EXPO_NO_GIT_STATUS: 1
          API_URL: ${{ secrets.STAGING_API_URL }}

      - name: Check prebuild output
        id: prebuild_check
        if: steps.check.outputs.should_run == 'true'
        run: |
          if [ -d apps/mobile/ios ] && [ "${{ steps.prebuild.outcome }}" = "success" ]; then
            echo "ios_ready=true" >> $GITHUB_OUTPUT
          else
            echo "ios_ready=false" >> $GITHUB_OUTPUT
            echo "::warning::expo prebuild did not produce apps/mobile/ios — skipping xcodebuild and Maestro steps"
            echo "Prebuild outcome: ${{ steps.prebuild.outcome }}"
            echo "Tip: Ensure STAGING_API_URL secret is set and Expo credentials are configured"
          fi

      - name: Build iOS app for simulator
        if: steps.prebuild_check.outputs.ios_ready == 'true'
        working-directory: apps/mobile/ios
        run: |
          xcodebuild \
            -workspace fitsy.xcworkspace \
            -scheme fitsy \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Boot iOS simulator
        if: steps.prebuild_check.outputs.ios_ready == 'true'
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | jq -r '[.devices | to_entries[] | .value[] | select(.name == "iPhone 15" and .isAvailable == true)] | first | .udid')
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b

      - name: Install app on simulator
        if: steps.prebuild_check.outputs.ios_ready == 'true'
        run: |
          APP_PATH=$(find apps/mobile/ios/build -name "*.app" -not -path "*/intermediates/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app artifact found — xcodebuild may have failed silently"
            exit 1
          fi
          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"

      - name: Run Maestro flows
        if: steps.prebuild_check.outputs.ios_ready == 'true'
        run: maestro test e2e/flows/
        env:
          MAESTRO_APP_ID: com.fitsy.app

      - name: Upload test artifacts on failure
        if: failure() && steps.prebuild_check.outputs.ios_ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots
          path: ~/.maestro/tests/
          retention-days: 7
