name: PR Checks

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  domain-check:
    name: Single-domain PR check
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.check.outputs.agent }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Enforce single-domain PR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGED=$(gh pr diff ${{ github.event.pull_request.number }} --name-only 2>/dev/null \
            || git diff --name-only origin/main...HEAD)

          # Exclude auto-generated and scaffolding files — not domain code
          CHANGED=$(echo "$CHANGED" | grep -v 'package-lock.json$')
          CHANGED=$(echo "$CHANGED" | grep -v '.gitkeep$')

          AGENTS=""

          # Root-level config files are CTO infrastructure
          if echo "$CHANGED" | grep -qE '^(package\.json|tsconfig\.json|\.nvmrc|\.env[^/]*)$'; then
            AGENTS="$AGENTS cto"
          fi
          # Prisma schema ships with API code — route to backend
          if echo "$CHANGED" | grep -qE '^prisma/'; then
            AGENTS="$AGENTS backend"
          fi
          # All of apps/api/ → backend (source code, config, tests, etc.)
          if echo "$CHANGED" | grep -qE '^apps/api/'; then
            AGENTS="$AGENTS backend"
          fi
          # All of apps/mobile/ → frontend
          if echo "$CHANGED" | grep -qE '^apps/mobile/'; then
            AGENTS="$AGENTS frontend"
          fi
          # packages/shared/ — workspace config → cto; src/ → backend
          if echo "$CHANGED" | grep -qE '^packages/shared/(package\.json|tsconfig\.json)$'; then
            AGENTS="$AGENTS cto"
          fi
          if echo "$CHANGED" | grep -qE '^packages/shared/src/'; then
            AGENTS="$AGENTS backend"
          fi
          if echo "$CHANGED" | grep -qE '^docs/design/'; then
            AGENTS="$AGENTS designer"
          fi
          if echo "$CHANGED" | grep -qE '^(docs/product/|proj-mgmt/)'; then
            AGENTS="$AGENTS product-manager"
          fi
          if echo "$CHANGED" | grep -qE '^docs/gtm/'; then
            AGENTS="$AGENTS gtm"
          fi
          # docs/engineering/backend/ is backend-owned spec territory
          if echo "$CHANGED" | grep -qE '^docs/engineering/backend/'; then
            AGENTS="$AGENTS backend"
          fi
          # .github/ .claude/ scripts/ CLAUDE.md docs/engineering/adrs/ devops/ -> cto
          if echo "$CHANGED" | grep -qE '^(\.github/|\.claude/|scripts/|CLAUDE\.md|docs/engineering/(adrs|devops)/)'; then
            AGENTS="$AGENTS cto"
          fi

          if [ -z "$AGENTS" ]; then
            AGENTS="cto"
          fi

          COUNT=$(echo "$AGENTS" | tr ' ' '\n' | sed '/^$/d' | sort -u | wc -l | xargs)
          UNIQUE=$(echo "$AGENTS" | tr ' ' '\n' | sed '/^$/d' | sort -u | tr '\n' ' ' | xargs)

          echo "agent=$UNIQUE" >> $GITHUB_OUTPUT
          echo "Domains touched: $UNIQUE ($COUNT)"

          if [ "$COUNT" -gt 1 ]; then
            echo "::error::PR touches multiple domains ($UNIQUE). Split into per-domain PRs."
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "**domain-check**: This PR touches **$COUNT domains** ($UNIQUE). PRs must be scoped to a single domain. Please split into separate PRs." || true
            exit 1
          fi

          echo "Single domain: $UNIQUE"

  structural-tests:
    name: Structural Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node (if workspace exists)
        id: node-check
        run: |
          if [ -f package.json ]; then
            echo "has_pkg=true" >> $GITHUB_OUTPUT
          else
            echo "has_pkg=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        if: steps.node-check.outputs.has_pkg == 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.node-check.outputs.has_pkg == 'true'
        run: npm ci

      - name: Run structural tests
        run: bash scripts/structural-tests.sh
