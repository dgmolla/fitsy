name: PR Checks

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  domain-check:
    name: Single-domain PR check
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.check.outputs.agent }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Enforce single-domain PR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGED=$(gh pr diff ${{ github.event.pull_request.number }} --name-only 2>/dev/null \
            || git diff --name-only origin/main...HEAD)

          AGENTS=""

          if echo "$CHANGED" | grep -qE '^(apps/api/|prisma/|packages/shared/)'; then
            AGENTS="$AGENTS backend"
          fi
          if echo "$CHANGED" | grep -qE '^apps/mobile/'; then
            AGENTS="$AGENTS frontend"
          fi
          if echo "$CHANGED" | grep -qE '^docs/design/'; then
            AGENTS="$AGENTS designer"
          fi
          if echo "$CHANGED" | grep -qE '^(docs/product/|proj-mgmt/)'; then
            AGENTS="$AGENTS product-manager"
          fi
          if echo "$CHANGED" | grep -qE '^docs/gtm/'; then
            AGENTS="$AGENTS gtm"
          fi
          if echo "$CHANGED" | grep -qE '^(\.github/|\.claude/|scripts/|CLAUDE\.md|docs/engineering/)'; then
            AGENTS="$AGENTS cto"
          fi

          if [ -z "$AGENTS" ]; then
            AGENTS="cto"
          fi

          COUNT=$(echo "$AGENTS" | tr ' ' '\n' | sed '/^$/d' | sort -u | wc -l | xargs)
          UNIQUE=$(echo "$AGENTS" | tr ' ' '\n' | sed '/^$/d' | sort -u | tr '\n' ' ' | xargs)

          echo "agent=$UNIQUE" >> $GITHUB_OUTPUT
          echo "Domains touched: $UNIQUE ($COUNT)"

          if [ "$COUNT" -gt 1 ]; then
            echo "::error::PR touches multiple domains ($UNIQUE). Split into per-domain PRs."
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "**domain-check**: This PR touches **$COUNT domains** ($UNIQUE). PRs must be scoped to a single domain. Please split into separate PRs." || true
            exit 1
          fi

          echo "Single domain: $UNIQUE"
