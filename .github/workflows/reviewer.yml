name: PR Checks

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  domain-check:
    name: Single-domain PR check
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.check.outputs.agent }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Enforce single-domain PR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGED=$(gh pr diff ${{ github.event.pull_request.number }} --name-only 2>/dev/null \
            || git diff --name-only origin/main...HEAD)

          # Always use main's route-reviewers.sh so PR branches don't need rebasing
          git show origin/main:scripts/route-reviewers.sh > /tmp/route-reviewers.sh
          RESULT=$(echo "$CHANGED" | bash /tmp/route-reviewers.sh)
          echo "Route result: $RESULT"

          # Parse JSON array → space-separated unique agents
          UNIQUE=$(echo "$RESULT" | tr -d '[]"' | tr ',' '\n' | sed '/^$/d' | sort -u | tr '\n' ' ' | xargs)
          COUNT=$(echo "$UNIQUE" | wc -w | xargs)

          echo "agent=$UNIQUE" >> $GITHUB_OUTPUT
          echo "Domains touched: $UNIQUE ($COUNT)"

          if [ "$COUNT" -gt 1 ]; then
            echo "::error::PR touches multiple domains ($UNIQUE). Split into per-domain PRs."
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "**domain-check**: This PR touches **$COUNT domains** ($UNIQUE). PRs must be scoped to a single domain. Please split into separate PRs." || true
            exit 1
          fi

          echo "Single domain: $UNIQUE"

  structural-tests:
    name: Structural Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node (if workspace exists)
        id: node-check
        run: |
          if [ -f package.json ]; then
            echo "has_pkg=true" >> $GITHUB_OUTPUT
          else
            echo "has_pkg=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        if: steps.node-check.outputs.has_pkg == 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.node-check.outputs.has_pkg == 'true'
        run: npm ci

      - name: Run structural tests
        run: bash scripts/structural-tests.sh
