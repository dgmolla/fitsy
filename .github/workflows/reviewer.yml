name: Automated Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  route:
    name: Route to Reviewer
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.route.outputs.agents }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Determine reviewing agents
        id: route
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGED=$(gh pr diff ${{ github.event.pull_request.number }} --name-only 2>/dev/null \
            || git diff --name-only origin/main...HEAD)
          AGENTS_JSON=$(echo "$CHANGED" | bash scripts/route-reviewers.sh)
          echo "agents=$AGENTS_JSON" >> $GITHUB_OUTPUT
          echo "Routed to: $AGENTS_JSON"

  review:
    name: "Review (${{ matrix.agent }})"
    runs-on: ubuntu-latest
    needs: route
    strategy:
      matrix:
        agent: ${{ fromJson(needs.route.outputs.agents) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run review with Claude Code
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          AGENT="${{ matrix.agent }}"

          PR_TITLE=$(gh pr view "$PR_NUM" --json title --jq '.title')
          PR_BODY=$(gh pr view "$PR_NUM" --json body --jq '.body')
          CI_STATUS=$(gh pr checks "$PR_NUM" 2>&1 || true)

          cat <<PROMPT > /tmp/review_prompt.txt
          You are the **${AGENT}** agent reviewing PR #${PR_NUM}.

          Read your role definition from .claude/agents/${AGENT}.md
          Read the review guidelines from .claude/agents/reviewer.md
          Read CLAUDE.md for project context.

          PR Title: ${PR_TITLE}
          PR Description: ${PR_BODY}

          CI Status:
          ${CI_STATUS}

          Now review the PR:
          1. Run: gh pr diff ${PR_NUM}  — to see the full diff
          2. Read any source files you need for full context (don't just rely on the diff)
          3. Check the diff against your role-specific checklist AND the general review checklist
          4. Be specific with file paths and line references

          End your review with EXACTLY one of:
          VERDICT: APPROVE
          VERDICT: CHANGES REQUESTED
          VERDICT: BLOCK
          PROMPT

          REVIEW=$(cat /tmp/review_prompt.txt | claude -p \
            --model sonnet \
            --allowedTools "Read,Glob,Grep,Bash(gh pr diff *),Bash(git log *),Bash(git diff *)")

          echo "$REVIEW" > /tmp/review.txt

          VERDICT=$(echo "$REVIEW" | sed 's/\*//g' | grep -oP '^\s*VERDICT:\s*\K\w+.*' | tail -1 | xargs)
          if [ -z "$VERDICT" ]; then echo "decision=unknown" >> $GITHUB_OUTPUT
          elif echo "$VERDICT" | grep -qi "APPROVE"; then echo "decision=approve" >> $GITHUB_OUTPUT
          elif echo "$VERDICT" | grep -qi "BLOCK"; then echo "decision=block" >> $GITHUB_OUTPUT
          else echo "decision=changes_requested" >> $GITHUB_OUTPUT; fi

      - name: Post review and handle verdict
        id: post
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DECISION="${{ steps.review.outputs.decision }}"
          AGENT="${{ matrix.agent }}"
          echo "decision=$DECISION" >> $GITHUB_OUTPUT
          printf '## %s Review\n\n%s' "$AGENT" "$(cat /tmp/review.txt)" > /tmp/review_body.md

          NEEDS_HUMAN=$(gh pr view ${{ github.event.pull_request.number }} --json labels \
            --jq '.labels | map(.name) | if any(. == "human-review") then "true" else "false" end')

          if [ "$DECISION" = "approve" ]; then
            gh pr review ${{ github.event.pull_request.number }} --approve --body-file /tmp/review_body.md
            if [ "$NEEDS_HUMAN" = "true" ]; then
              gh pr comment ${{ github.event.pull_request.number }} --body "**$AGENT** approved. Waiting for human review."
            fi
          else
            gh pr review ${{ github.event.pull_request.number }} --comment --body-file /tmp/review_body.md
            exit 1
          fi

  fix:
    name: Auto-fix Review Comments
    runs-on: ubuntu-latest
    needs: [route, review]
    if: ${{ always() && needs.route.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Check if fixes are needed
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REVIEWS=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
            --jq '[.[] | select(.user.login == "github-actions[bot]" and (.body | contains("VERDICT: CHANGES REQUESTED")))] | length')
          if [ "$REVIEWS" -eq 0 ]; then
            echo "No changes requested — skipping fix"
            echo "needed=false" >> $GITHUB_OUTPUT
          else
            echo "$REVIEWS review(s) requested changes"
            echo "needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check.outputs.needed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.check.outputs.needed == 'true'
        run: npm install --ignore-scripts

      - name: Install Claude Code
        if: steps.check.outputs.needed == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Collect review feedback
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          gh api repos/${{ github.repository }}/pulls/${PR_NUM}/reviews \
            --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("VERDICT: CHANGES REQUESTED"))) | .body' \
            > /tmp/review_comments.txt

          REQUESTING_AGENTS=$(gh api repos/${{ github.repository }}/pulls/${PR_NUM}/reviews \
            --jq '[.[] | select(.user.login == "github-actions[bot]" and (.body | contains("VERDICT: CHANGES REQUESTED"))) | .body | capture("## (?<agent>\\S+) Review") | .agent] | join(", ")')
          gh pr comment "$PR_NUM" --body "**harness-bot**: Starting auto-fix for feedback from **${REQUESTING_AGENTS}**..."

      - name: Fix and validate
        if: steps.check.outputs.needed == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: bash scripts/fix-and-validate.sh /tmp/review_comments.txt

      - name: Commit and push fixes
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "harness-bot"
          git config user.email "bot@harness.dev"
          PR_NUM=${{ github.event.pull_request.number }}
          git add -u
          if ! git diff --cached --quiet; then
            git commit -m "[Bot] Fix review comments"
            git push
            COMMIT_SHA=$(git rev-parse --short HEAD)
            gh pr comment "$PR_NUM" --body "**harness-bot**: Pushed fix commit \`${COMMIT_SHA}\` — triggering re-review."
          else
            gh pr comment "$PR_NUM" --body "**harness-bot**: Review feedback addressed — no file changes needed."
          fi

  merge:
    name: Auto-merge
    runs-on: ubuntu-latest
    needs: [route, review]
    if: ${{ !contains(needs.review.result, 'failure') }}
    steps:
      - uses: actions/checkout@v4

      - name: Check all reviews approved and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEEDS_HUMAN=$(gh pr view ${{ github.event.pull_request.number }} --json labels \
            --jq '.labels | map(.name) | if any(. == "human-review") then "true" else "false" end')

          if [ "$NEEDS_HUMAN" = "true" ]; then
            echo "Human review required — skipping auto-merge"
            exit 0
          fi

          for i in $(seq 1 30); do
            STATUS=$(gh pr checks ${{ github.event.pull_request.number }} --json name,state \
              --jq '[.[] | select(.name | test("Review|Route|Auto-merge|Auto-fix") | not) | .state] | if length == 0 then "pass" elif all(. == "SUCCESS") then "pass" elif any(. == "FAILURE") then "fail" else "pending" end' 2>/dev/null || echo "pending")
            if [ "$STATUS" = "pass" ]; then
              gh pr merge ${{ github.event.pull_request.number }} --squash --delete-branch
              break
            elif [ "$STATUS" = "fail" ]; then
              gh pr comment ${{ github.event.pull_request.number }} --body "All agent reviews passed but CI is failing. Fix CI before merge."
              break
            fi
            sleep 10
          done
