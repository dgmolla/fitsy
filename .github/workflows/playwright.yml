name: Playwright E2E (video)

on:
  pull_request:
    paths:
      - "apps/api/**"

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-video:
    name: E2E video recording
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/api
        run: npx playwright install --with-deps chromium

      - name: Resolve preview URL
        id: preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_SLUG: ${{ secrets.VERCEL_TEAM_SLUG }}
          VERCEL_PROJECT: fitsy-api
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set — skipping E2E"
            echo "url=" >> $GITHUB_OUTPUT
          else
            # Poll up to 3 min for a ready Vercel deployment matching this commit
            DEADLINE=$((SECONDS + 180))
            while [ $SECONDS -lt $DEADLINE ]; do
              URL=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v6/deployments?teamId=$VERCEL_TEAM_SLUG&projectId=$VERCEL_PROJECT&limit=5" \
                | jq -r --arg sha "$SHA" \
                  '.deployments[] | select(.meta.githubCommitSha == $sha and .state == "READY") | .url' \
                | head -1)
              if [ -n "$URL" ]; then
                echo "url=https://$URL" >> $GITHUB_OUTPUT
                echo "Preview URL: https://$URL"
                break
              fi
              sleep 15
            done
            if [ -z "$URL" ]; then
              echo "::warning::No ready Vercel preview found for SHA $SHA — skipping E2E"
              echo "url=" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run Playwright tests with video
        if: steps.preview.outputs.url != ''
        working-directory: apps/api
        env:
          BASE_URL: ${{ steps.preview.outputs.url }}
        run: npx playwright test

      - name: Upload video artifacts
        if: always() && steps.preview.outputs.url != ''
        uses: actions/upload-artifact@v4
        id: upload
        with:
          name: playwright-videos-${{ github.run_id }}
          path: apps/api/test-results/
          retention-days: 14

      - name: Post video link to PR
        if: always() && steps.preview.outputs.url != '' && steps.upload.outputs.artifact-id != ''
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = `${runUrl}#artifacts`;
            const outcome = '${{ job.status }}' === 'success' ? '✅' : '⚠️';
            const body = [
              `## ${outcome} Playwright E2E videos`,
              '',
              `Preview tested: ${{ steps.preview.outputs.url }}`,
              '',
              `📹 [Download videos](${artifactUrl}) (retained 14 days)`,
            ].join('\n');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
