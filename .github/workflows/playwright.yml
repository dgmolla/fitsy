name: Playwright E2E (video)

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/mobile/**"

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-video:
    name: E2E video recording
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/api
        run: npx playwright install --with-deps chromium

      - name: Build API
        working-directory: apps/api
        run: npm run build
        env:
          POSTGRES_PRISMA_URL: ${{ secrets.POSTGRES_PRISMA_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          GOOGLE_PLACES_API_KEY: placeholder
          ANTHROPIC_API_KEY: placeholder
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Test DB connection
        env:
          POSTGRES_PRISMA_URL: ${{ secrets.POSTGRES_PRISMA_URL }}
        run: |
          node -e "
          const { PrismaClient } = require('@prisma/client');
          const p = new PrismaClient();
          p.\$queryRaw\`SELECT 1 as ok\`
            .then(r => { console.log('DB connection OK:', JSON.stringify(r)); return p.\$disconnect(); })
            .catch(e => { console.error('DB connection FAILED:', e.message, 'code:', e.code); p.\$disconnect(); process.exit(1); });
          "

      - name: Start API server
        working-directory: apps/api
        run: npm start > /tmp/api-server.log 2>&1 &
        env:
          PORT: 3000
          POSTGRES_PRISMA_URL: ${{ secrets.POSTGRES_PRISMA_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          GOOGLE_PLACES_API_KEY: placeholder
          ANTHROPIC_API_KEY: placeholder
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: production

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Test bcrypt and jose modules
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          node -e "
          const bcrypt = require('bcryptjs');
          const { SignJWT } = require('jose');
          async function run() {
            const hash = await bcrypt.hash('TestPass123!', 12);
            console.log('bcrypt OK:', hash.substr(0, 10) + '...');
            const secret = new TextEncoder().encode(process.env.JWT_SECRET);
            const token = await new SignJWT({ email: 'test@test.com' })
              .setProtectedHeader({ alg: 'HS256' })
              .setSubject('test-id')
              .setIssuedAt()
              .setExpirationTime('7d')
              .sign(secret);
            console.log('jose OK: token starts with', token.substr(0, 20));
          }
          run().catch(e => { console.error('FAILED:', e); process.exit(1); });
          "

      - name: Smoke-test health and register endpoints
        run: |
          echo "=== /api/health ==="
          curl -s http://localhost:3000/api/health
          echo ""
          echo "=== /api/auth/register ==="
          curl -s -X POST http://localhost:3000/api/auth/register \
            -H 'Content-Type: application/json' \
            -d '{"email":"smoke-ci-debug@fitsy.test","password":"TestPass123!"}'
          echo ""
          echo "=== Server logs ==="
          cat /tmp/api-server.log || true

      - name: Run Playwright tests with video
        working-directory: apps/api
        env:
          BASE_URL: http://localhost:3000
        run: npx playwright test

      - name: Dump server logs
        if: always()
        run: cat /tmp/api-server.log || true

      - name: Upload video artifacts
        if: always()
        uses: actions/upload-artifact@v4
        id: upload
        with:
          name: playwright-videos-${{ github.run_id }}
          path: apps/api/test-results/
          retention-days: 14

      - name: Post video link to PR
        if: always() && steps.upload.outputs.artifact-id != ''
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = `${runUrl}#artifacts`;
            const outcome = '${{ job.status }}' === 'success' ? '✅' : '⚠️';
            const body = [
              `## ${outcome} Playwright E2E videos`,
              '',
              `Tested against: local build (localhost:3000)`,
              '',
              `📹 [Download videos](${artifactUrl}) (retained 14 days)`,
            ].join('\n');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
