name: Fix Review Comments

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: fix-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fix:
    name: Auto-fix Review Comments
    runs-on: ubuntu-latest
    if: >-
      github.event.review.state == 'commented' &&
      contains(github.event.review.body, 'VERDICT: CHANGES REQUESTED')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Extract agent name and review
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews/${{ github.event.review.id }} \
            --jq '.body' > /tmp/review_comments.txt

          # Extract agent name from review body (format: "## <agent> Review")
          AGENT_NAME=$(head -1 /tmp/review_comments.txt | sed -n 's/^## \(.*\) Review.*/\1/p' | xargs)
          echo "agent=${AGENT_NAME:-unknown}" >> $GITHUB_OUTPUT

      - name: Fix and validate loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AGENT="${{ steps.context.outputs.agent }}"
          REVIEW_COMMENTS=$(cat /tmp/review_comments.txt)
          MAX_ATTEMPTS=10
          STUCK_THRESHOLD=3

          AGENT_CONTEXT=""
          if [ "$AGENT" != "unknown" ] && [ -f ".claude/agents/${AGENT}.md" ]; then
            AGENT_CONTEXT="Read your role definition from .claude/agents/${AGENT}.md to understand the domain context."
          fi

          GATE_ERRORS=""
          PREV_ERROR_HASH=""
          SAME_ERROR_COUNT=0

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Attempt $attempt of $MAX_ATTEMPTS ==="

            # Build the prompt — first attempt gets review feedback, retries get gate errors
            if [ "$attempt" -eq 1 ]; then
              PROMPT="You are the **${AGENT}** agent fixing review feedback on this PR.

          ${AGENT_CONTEXT}
          Read CLAUDE.md for project context and conventions.

          Here is the review feedback you must address:

          ${REVIEW_COMMENTS}

          Instructions:
          1. Read the review feedback carefully — only fix issues that were flagged
          2. Read the relevant source files to understand full context before editing
          3. Make the fixes using the Edit tool
          4. Do NOT refactor, improve, or change anything beyond what the review requested
          5. Do NOT add comments, docstrings, or type annotations unless the review asked for them"
            else
              PROMPT="You are the **${AGENT}** agent. Your previous fix attempt failed the pre-PR gates.

          ${AGENT_CONTEXT}
          Read CLAUDE.md for project context and conventions.

          Here is the original review feedback:

          ${REVIEW_COMMENTS}

          Here are the gate errors from your last attempt:

          ${GATE_ERRORS}

          Fix these errors. Read the failing files, understand the issue, and correct it.
          Do NOT revert your previous fixes — build on them."
            fi

            claude -p \
              --model sonnet \
              --allowedTools "Read,Glob,Grep,Edit,Write,Bash(npx tsc *),Bash(npm test *),Bash(npm run build *),Bash(bash scripts/structural-tests.sh),Bash(git diff *)" \
              "$PROMPT"

            # Run pre-PR gates
            echo "=== Running pre-PR gates ==="
            GATE_ERRORS=""
            GATES_PASSED=true

            echo "--- Structural tests ---"
            if ! bash scripts/structural-tests.sh > /tmp/gate_output.txt 2>&1; then
              GATES_PASSED=false
              GATE_ERRORS="${GATE_ERRORS}

          STRUCTURAL TESTS FAILED:
          $(cat /tmp/gate_output.txt)"
            fi

            echo "--- Type check ---"
            if ! npx tsc --noEmit > /tmp/gate_output.txt 2>&1; then
              GATES_PASSED=false
              GATE_ERRORS="${GATE_ERRORS}

          TYPE CHECK FAILED:
          $(cat /tmp/gate_output.txt)"
            fi

            echo "--- Tests ---"
            if ! npm test > /tmp/gate_output.txt 2>&1; then
              GATES_PASSED=false
              GATE_ERRORS="${GATE_ERRORS}

          TESTS FAILED:
          $(cat /tmp/gate_output.txt)"
            fi

            echo "--- Build ---"
            if ! npm run build > /tmp/gate_output.txt 2>&1; then
              GATES_PASSED=false
              GATE_ERRORS="${GATE_ERRORS}

          BUILD FAILED:
          $(cat /tmp/gate_output.txt)"
            fi

            echo "--- No build output ---"
            if git diff --name-only | grep -qE '\.(js|js\.map)$'; then
              GATES_PASSED=false
              GATE_ERRORS="${GATE_ERRORS}

          BUILD OUTPUT DETECTED IN WORKING TREE — remove compiled .js/.js.map files"
            fi

            if [ "$GATES_PASSED" = "true" ]; then
              echo "All gates passed on attempt $attempt"
              break
            fi

            echo "Gates failed on attempt $attempt"

            # Detect if we're stuck on the same error
            CURRENT_ERROR_HASH=$(echo "$GATE_ERRORS" | md5sum | cut -d' ' -f1)
            if [ "$CURRENT_ERROR_HASH" = "$PREV_ERROR_HASH" ]; then
              SAME_ERROR_COUNT=$((SAME_ERROR_COUNT + 1))
            else
              SAME_ERROR_COUNT=1
              PREV_ERROR_HASH="$CURRENT_ERROR_HASH"
            fi

            if [ "$SAME_ERROR_COUNT" -ge "$STUCK_THRESHOLD" ]; then
              echo "ERROR: Same error $STUCK_THRESHOLD times in a row — stuck"
              gh pr comment ${{ github.event.pull_request.number }} --body "**harness-bot**: Auto-fix is stuck — same gate error ${STUCK_THRESHOLD}x in a row after ${attempt} attempts.

          \`\`\`
          ${GATE_ERRORS}
          \`\`\`

          Manual intervention needed."
              exit 1
            fi

            if [ "$attempt" -eq "$MAX_ATTEMPTS" ]; then
              echo "ERROR: Failed after $MAX_ATTEMPTS attempts"
              gh pr comment ${{ github.event.pull_request.number }} --body "**harness-bot**: Auto-fix failed after ${MAX_ATTEMPTS} attempts. Gate errors on final attempt:

          \`\`\`
          ${GATE_ERRORS}
          \`\`\`

          Manual intervention needed."
              exit 1
            fi
          done

      - name: Commit and push fixes
        run: |
          git config user.name "harness-bot"
          git config user.email "bot@harness.dev"
          git add -A
          if ! git diff --cached --quiet; then
            AGENT="${{ steps.context.outputs.agent }}"
            git commit -m "[Bot] Fix ${AGENT} review comments"
            git push
          else
            echo "No changes to commit"
          fi
